    get:
      operationId: bible_cross_references_for_grouped_list
      description: |-
        Group cross-references by strength (confidence) for a textual reference.

        Strength buckets (by confidence):
        - very_strong: >= 0.85
        - strong:      >= 0.65
        - moderate:    >= 0.40
        - weak:        < 0.40
      summary: Group cross-references by strength
      parameters:
      - in: query
        name: min_confidence
        schema:
          type: string
        description: Minimum confidence (0-1) to include in groups
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: ref
        schema:
          type: string
        description: Text reference (e.g., 'Jo 3:16')
        required: true
      - in: query
        name: source
        schema:
          type: string
        description: Filter by source code (case-insensitive)
      tags:
      - cross-references
      security:
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCrossReferenceList'
              examples:
                GroupedByConfidence:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - input: Jo 3:16
                      total: 4
                      by_source:
                        TSK: 3
                        OpenBible: 1
                      groups:
                      - strength: very_strong
                        count: 2
                        items: []
                      - strength: strong
                        count: 1
                        items: []
                      - strength: moderate
                        count: 1
                        items: []
                      - strength: weak
                        count: 0
                        items: []
                  summary: Grouped by confidence
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
