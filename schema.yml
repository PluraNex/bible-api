  /api/v1/bible/books/:
    get:
      operationId: bible_books_list
      description: |-
        Mixin to automatically add Vary: Accept-Language header to all responses.

        This ensures proper HTTP caching behavior for internationalized endpoints
        that may return different content based on Accept-Language header.

        Usage:
            class MyView(LanguageSensitiveMixin, APIView):
                pass

        The mixin works by overriding finalize_response to add the Vary header
        to all response types (2xx, 4xx, 5xx).
      parameters:
      - in: query
        name: canonical_order_max
        schema:
          type: integer
        description: Maximum canonical order
      - in: query
        name: canonical_order_min
        schema:
          type: integer
        description: Minimum canonical order
      - in: query
        name: category
        schema:
          type: integer
        description: Filter by book category ID
      - in: query
        name: category_name
        schema:
          type: string
        description: Filter by category name
      - in: query
        name: chapter_count_max
        schema:
          type: integer
        description: Maximum number of chapters
      - in: query
        name: chapter_count_min
        schema:
          type: integer
        description: Minimum number of chapters
      - in: query
        name: is_deuterocanonical
        schema:
          type: boolean
        description: Filter deuterocanonical books (true/false)
      - in: query
        name: name
        schema:
          type: string
        description: Search by book name in any language
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: osis_code
        schema:
          type: string
        description: Filter by OSIS code (e.g., 'John', 'Gen')
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: testament
        schema:
          type: integer
          enum:
          - new
          - old
        description: |-
          Filter by testament code (old/new)

          * `old` - Old Testament
          * `new` - New Testament
      - in: query
        name: testament_code
        schema:
          type: string
          enum:
          - new
          - old
        description: |-
          Filter by testament code (old/new)

          * `old` - Old Testament
          * `new` - New Testament
      - in: query
        name: testament_id
        schema:
          type: integer
        description: Filter by testament ID
      tags:
      - bible
      security:
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookList'
          description: ''
