components:
  schemas:
    APIKeyResponse:
      type: object
      description: Serializer for API key response.
      properties:
        api_key:
          type: string
          description: Your API key - keep this secure!
        name:
          type: string
          description: Developer name
        email:
          type: string
          format: email
          description: Developer email
        rate_limit:
          type: integer
          description: Requests per hour limit
        scopes:
          type: array
          items:
            type: string
          description: 'Available scopes: read, write, ai, audio'
        created_at:
          type: string
          format: date-time
          description: API key creation date
        documentation_url:
          type: string
          format: uri
          description: Link to API documentation
        examples:
          type: object
          additionalProperties: {}
          description: Quick start examples
      required:
      - api_key
      - created_at
      - documentation_url
      - email
      - examples
      - name
      - rate_limit
      - scopes
    AgentRunApproveRequest:
      type: object
      description: Serializer for approving an AI agent run.
      properties:
        run_id:
          type: integer
          description: ID of the agent run to approve.
        note:
          type: string
          description: Optional note for approval.
      required:
      - run_id
    AgentRunCreateRequest:
      type: object
      description: Serializer for creating an AI agent run.
      properties:
        agent:
          type: string
          description: Name of the agent to run.
        input_payload:
          type: object
          additionalProperties: {}
          description: Input data for the agent run.
      required:
      - agent
      - input_payload
    AgentRunResponse:
      type: object
      description: Serializer for AI agent run details and responses.
      properties:
        agent:
          type: string
        run_id:
          type: integer
        status:
          type: string
        message:
          type: string
      required:
      - message
      - status
    Book:
      type: object
      description: |-
        Serializer melhorado para livros - frontend-friendly.

        Inclui objeto testament normalizado com código (old/new).
        Inclui objeto category para categorização de livros.
        Resposta otimizada sem campos duplicados.
      properties:
        osis_code:
          type: string
          maxLength: 12
        name:
          type: string
          description: Get localized name using the existing utility function with
            fallback logic.
          readOnly: true
        abbreviation:
          type: string
          description: Get localized abbreviation using the existing utility function
            with fallback logic.
          readOnly: true
        aliases:
          type: string
          readOnly: true
        order:
          type: integer
        testament:
          type: string
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/BookCategory'
          readOnly: true
        chapter_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_deuterocanonical:
          type: boolean
        language_code:
          type: string
          readOnly: true
      required:
      - abbreviation
      - aliases
      - category
      - chapter_count
      - language_code
      - name
      - order
      - testament
    BookAlias:
      type: object
      description: Serializer for book alias information.
      properties:
        osis_code:
          type: string
        canonical_name:
          type: string
          description: Primary canonical name
        aliases:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: List of aliases with language and version info
        testament:
          type: string
        canonical_order:
          type: integer
      required:
      - aliases
      - canonical_name
      - canonical_order
      - osis_code
      - testament
    BookCanonResult:
      type: object
      description: Serializer for canon tradition filtering results.
      properties:
        osis_code:
          type: string
        name:
          type: string
        canonical_order:
          type: integer
        testament:
          type: string
        is_deuterocanonical:
          type: boolean
        chapter_count:
          type: integer
        inclusion_reason:
          type: string
          description: Why this book is included in the tradition
      required:
      - canonical_order
      - chapter_count
      - inclusion_reason
      - is_deuterocanonical
      - name
      - osis_code
      - testament
    BookCategory:
      type: object
      description: Serializer para categorias de livros com localização.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        order:
          type: integer
          readOnly: true
          description: Ordem dentro do testamento
      required:
      - description
      - id
      - name
      - order
    BookChapterVerses:
      type: object
      description: Serializer for chapter verses listing.
      properties:
        chapter_number:
          type: integer
        verse_count:
          type: integer
        verses:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: List of verses in the chapter
        chapter_info:
          type: object
          additionalProperties: {}
          description: Additional chapter metadata
      required:
      - chapter_info
      - chapter_number
      - verse_count
      - verses
    BookNeighbors:
      type: object
      description: Serializer for book navigation (previous/next books).
      properties:
        current:
          type: object
          additionalProperties: {}
          description: Current book information
        previous:
          type: object
          additionalProperties: {}
          nullable: true
          description: Previous book in canonical order
        next:
          type: object
          additionalProperties: {}
          nullable: true
          description: Next book in canonical order
        testament_neighbors:
          type: object
          additionalProperties: {}
          description: Navigation within same testament
