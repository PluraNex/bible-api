          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeveloperRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeveloperRegistration'
        required: true
      security:
      - ApiKeyAuth: []
