    Verse:
      type: object
      description: |-
        Verse serializer melhorado - frontend-friendly.

        Inclui objetos aninhados para book e version, evitando múltiplas requisições.
        Renomeia 'number' para 'verse' para melhor clareza.
        Resposta otimizada sem campos duplicados.
      properties:
        id:
          type: integer
          readOnly: true
        book:
          allOf:
          - $ref: '#/components/schemas/BookNested'
          readOnly: true
        version:
          allOf:
          - $ref: '#/components/schemas/VersionNested'
          readOnly: true
        chapter:
          type: integer
          maximum: 2147483647
          minimum: 0
        verse:
          type: integer
          readOnly: true
        text:
          type: string
        reference:
          type: string
          readOnly: true
        language_code:
          type: string
          readOnly: true
      required:
      - book
      - chapter
      - id
      - language_code
      - reference
      - text
      - verse
      - version
    Version:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 40
        abbreviation:
          type: string
          readOnly: true
        language:
          type: string
        description:
          type: string
        is_active:
          type: boolean
      required:
      - abbreviation
      - id
      - language
      - name
    VersionNested:
      type: object
      description: Serializer aninhado para versão - estrutura simplificada.
      properties:
