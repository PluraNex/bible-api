  /api/v1/ai/rag/retrieve/:
    get:
      operationId: ai_rag_retrieve_retrieve
      description: 'RAG retrieve endpoint: GET /api/v1/ai/rag/retrieve'
      summary: RAG retrieve — top‑K versos
      parameters:
      - in: query
        name: book_id
        schema:
          type: integer
      - in: query
        name: chapter
        schema:
          type: integer
      - in: query
        name: chapter_end
        schema:
          type: integer
      - in: query
        name: q
        schema:
          type: string
        description: Texto da consulta (use se não enviar 'vector')
        examples:
          QueryPt:
            value: amor de Deus
            summary: query_pt
      - in: query
        name: top_k
        schema:
          type: integer
        description: Padrão 10
      - in: query
        name: vector
        schema:
          type: string
        description: Vetor JSON (lista de floats) — evita chamada ao OpenAI
        examples:
          VectorExample:
            value: '[0.01, -0.2, 0.3, ...]'
            summary: vector_example
      - in: query
        name: versions
        schema:
          type: string
        description: 'Códigos separados por vírgula (ex.: PT_NAA,EN_KJV). Se ausente,
          usa RAG_ALLOWED_VERSIONS do ambiente.'
      tags:
      - rag
      security:
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  hits:
                    type: array
                  timing:
                    type: object
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '405':
          content:
            application/json:
              schema:
